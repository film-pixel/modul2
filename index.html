require_once 'config/database.php';

$pesan  = "";
$errors = [];

if ($_SERVER['REQUEST_METHOD'] === 'POST') {
    // Ambil & sanitasi input
    $judul    = trim(htmlspecialchars($_POST['judul'] ?? ''));
    $penulis  = trim(htmlspecialchars($_POST['penulis'] ?? ''));
    $penerbit = trim(htmlspecialchars($_POST['penerbit'] ?? ''));
    $tahun    = intval($_POST['tahun'] ?? 0);
    $isbn     = trim($_POST['isbn'] ?? '');
    $kategori = trim(htmlspecialchars($_POST['kategori'] ?? ''));
    $stok     = intval($_POST['stok'] ?? 0);

    // Validasi
    if (empty($judul))   $errors[] = "Judul wajib diisi";
    if (empty($penulis)) $errors[] = "Penulis wajib diisi";
    if ($tahun < 1900 || $tahun > date('Y'))
        $errors[] = "Tahun tidak valid";

    if (empty($errors)) {
        // Prepared Statement (aman dari SQL Injection)
        $stmt = mysqli_prepare($conn,
            "INSERT INTO buku (judul, penulis, penerbit, tahun, isbn, kategori, stok)
             VALUES (?, ?, ?, ?, ?, ?, ?)"
        );
        mysqli_stmt_bind_param($stmt, "sssissi",
            $judul, $penulis, $penerbit, $tahun, $isbn, $kategori, $stok
        );

        if (mysqli_stmt_execute($stmt)) {
            $pesan = "✅ Buku berhasil ditambahkan!";
            // Redirect untuk menghindari resubmit
            header("Location: index.php?status=created");
            exit;
        } else {
            $pesan = "❌ Gagal: " . mysqli_error($conn);
        }
        mysqli_stmt_close($stmt);
    }
}

    title: 'Query JOIN - Laporan Peminjaman',
    content: () => `
      <div class="space-y-6">
        <h2 class="text-2xl font-extrabold text-slate-900">🔗 Query JOIN Untuk Laporan</h2>
        <p class="text-slate-600">Menggunakan <strong>INNER JOIN</strong> & <strong>LEFT JOIN</strong> untuk menggabungkan data dari 3 tabel.</p>

        <h3 class="text-lg font-bold text-slate-800 mb-2">1️⃣ Laporan Semua Peminjaman (dengan JOIN)</h3>
        ${codeBlock(`-- Tampilkan semua peminjaman dengan detail buku & anggota
SELECT 
    p.id,
    p.tgl_pinjam,
    p.tgl_kembali_rencana,
    p.tgl_kembali_actual,
    p.status,
    p.denda,
    b.judul AS nama_buku,
    b.penulis,
    a.nama AS nama_anggota,
    a.no_telp
FROM peminjaman p
INNER JOIN buku b ON p.id_buku = b.id
INNER JOIN anggota a ON p.id_anggota = a.id
ORDER BY p.tgl_pinjam DESC;`, 'sql')}

        <h3 class="text-lg font-bold text-slate-800 mb-2">2️⃣ Laporan Buku Sedang Dipinjam</h3>
        ${codeBlock(`-- Hanya buku yang status "dipinjam" (belum dikembalikan)
SELECT 
    p.id,
    b.judul,
    b.isbn,
    a.nama AS peminjam,
    p.tgl_pinjam,
    p.tgl_kembali_rencana,
    DATEDIFF(CURDATE(), p.tgl_kembali_rencana) AS hari_telat
FROM peminjaman p
INNER JOIN buku b ON p.id_buku = b.id
INNER JOIN anggota a ON p.id_anggota = a.id
WHERE p.status = 'dipinjam'
  AND CURDATE() > p.tgl_kembali_rencana
ORDER BY hari_telat DESC;`, 'sql')}

        <h3 class="text-lg font-bold text-slate-800 mb-2">3️⃣ Laporan Riwayat Per Anggota</h3>
        ${codeBlock(`-- Lihat semua peminjaman dari seorang anggota
SELECT 
    p.id,
    b.judul,
    p.tgl_pinjam,
    p.tgl_kembali_rencana,
    p.tgl_kembali_actual,
    p.status
FROM peminjaman p
INNER JOIN buku b ON p.id_buku = b.id
WHERE p.id_anggota = ? -- Parameter dari PHP
ORDER BY p.tgl_pinjam DESC;`, 'sql')}

        <h3 class="text-lg font-bold text-slate-800 mb-2">4️⃣ Statistik Buku Paling Sering Dipinjam</h3>
        ${codeBlock(`-- Top 10 buku yang paling banyak dipinjam
SELECT 
    b.id,
    b.judul,
    b.penulis,
    COUNT(p.id) AS jumlah_peminjaman,
    SUM(CASE WHEN p.status = 'dikembalikan' THEN 1 ELSE 0 END) AS dikembalikan,
    SUM(CASE WHEN p.status = 'hilang' THEN 1 ELSE 0 END) AS hilang
FROM peminjaman p
INNER JOIN buku b ON p.id_buku = b.id
GROUP BY b.id, b.judul, b.penulis
ORDER BY jumlah_peminjaman DESC
LIMIT 10;`, 'sql')}

        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
          <h3 class="font-bold text-sm text-amber-800 mb-2">📌 Penjelasan JOIN</h3>
          <ul class="text-sm text-amber-900 space-y-2">
            <li><strong>INNER JOIN:</strong> Hanya menampilkan baris yang ada di kedua tabel (strict match)</li>
            <li><strong>LEFT JOIN:</strong> Menampilkan semua dari tabel kiri, sekalipun tidak ada di tabel kanan</li>
            <li><strong>Alias (AS):</strong> <code class="bg-amber-100 px-1 rounded">b.judul AS nama_buku</code> — rename kolom agar mudah dibaca</li>
            <li><strong>GROUP BY:</strong> Mengelompokkan data untuk aggregation (COUNT, SUM)</li>
          </ul>
        </div>
      </div>`

// ─── Helper Functions ────────────────────────────────────
function codeBlock(code, lang) {
  const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="code-block bg-slate-900 text-slate-100 p-4 text-xs leading-relaxed relative">
    <button class="copy-btn px-2.5 py-1 bg-slate-700 hover:bg-slate-600 text-slate-300 rounded-md text-[10px] font-semibold transition" onclick="copyCode(this)">📋 Copy</button>
    <pre><code>${escaped}</code></pre>
  </div>`;
}

// ─── App State & Navigation ──────────────────────────────
let currentIdx = 0;

function renderNav() {
  const nav = document.getElementById('nav-links');
  nav.innerHTML = modules.map((m, i) => `
    <button onclick="goTo(${i})" class="sidebar-link flex items-center gap-2.5 px-3 py-2 rounded-r-lg text-sm text-left ${i === currentIdx ? 'active' : 'text-slate-600'}">
      <i data-lucide="${m.icon}" class="w-4 h-4 flex-shrink-0"></i>
      <span class="truncate">${m.title}</span>
    </button>
  `).join('');
  lucide.createIcons();
}

function renderContent() {
  const area = document.getElementById('content-area');
  area.className = 'fade-in';
  area.innerHTML = modules[currentIdx].content();

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = currentIdx === modules.length - 1;

  const pct = ((currentIdx + 1) / modules.length * 100).toFixed(0);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${currentIdx + 1} / ${modules.length}`;

  document.getElementById('main-content').scrollTop = 0;
  lucide.createIcons();
}

function goTo(idx) {
  currentIdx = idx;
  renderNav();
  renderContent();
}

window.copyCode = function(btn) {
  const code = btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    setTimeout(() => btn.innerHTML = orig, 1500);
  });
};

window.switchTab = function(btn, tab) {
  btn.closest('.space-y-2').querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('tab-active');
    b.classList.add('border-transparent', 'text-slate-400');
  });
  btn.classList.add('tab-active');
  btn.classList.remove('border-transparent', 'text-slate-400');
  document.getElementById('tab-mysqli').classList.toggle('hidden', tab !== 'mysqli');
  document.getElementById('tab-pdo').classList.toggle('hidden', tab !== 'pdo');
};

document.getElementById('btn-prev').addEventListener('click', () => { if (currentIdx > 0) goTo(currentIdx - 1); });
document.getElementById('btn-next').addEventListener('click', () => { if (currentIdx < modules.length - 1) goTo(currentIdx + 1); });

// Sidebar toggle mobile
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('hidden');
  sb.classList.toggle('flex');
  sb.classList.toggle('absolute');
  sb.classList.toggle('z-50');
  sb.classList.toggle('h-full');
});

// ─── Element SDK ─────────────────────────────────────────
const defaultConfig = {
  module_title: 'Modul CRUD Perpustakaan Digital',
  background_color: '#f8fafc',
  surface_color: '#ffffff',
  text_color: '#1e293b',
  primary_color: '#f97316',
  secondary_color: '#1e293b'
};

function applyConfig(config) {
  const c = { ...defaultConfig, ...config };
  document.getElementById('module-title').textContent = c.module_title;
  document.body.style.background = c.background_color;
  document.getElementById('main-header').style.background = c.secondary_color;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => applyConfig(config),
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); }},
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }},
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); }},
      { get: () => config.primary_color || defaultConfig.primary_color, set: v => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }},
      { get: () => config.secondary_color || defaultConfig.secondary_color, set: v => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); }}
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || 'Plus Jakarta Sans',
      set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: {
      get: () => config.font_size || 14,
      set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
    }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['module_title', config.module_title || defaultConfig.module_title]
  ])
});

// Initial render
renderNav();
renderContent();
</script>
